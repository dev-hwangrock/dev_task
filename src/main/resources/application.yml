spring:
  application:
    name: chatbot
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatbot}
    username: ${DB_USER:chatbot}
    password: ${DB_PASSWORD:chatbot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LWZvci1sb2NhbC1kZXYtb25seS0xMjM0NTY3ODkw}
  expiration-ms: 86400000

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: https://api.openai.com/v1
  default-model: gpt-5-nano

server:
  port: ${PORT:8080}
