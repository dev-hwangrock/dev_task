spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatbot_test}
    username: ${DB_USER:chatbot}
    password: ${DB_PASSWORD:chatbot}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      max-lifetime: 1800000
      idle-timeout: 600000
      pool-name: chatbot-hikari
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ZmFrZS1zZWNyZXQta2V5LWZvci10ZXN0LW9ubHktMTIzNDU2Nzg5MA==
  expiration-ms: 86400000

openai:
  api-key: ""
